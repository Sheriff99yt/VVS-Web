name: Deploy GitHub Pages

# Live preview on every push to main.
# After a successful deploy, updates the floating GitHub pre-release `pre-release`
# so the repo Releases sidebar shows a direct Pages link (and a downloadable zip).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          # Pin version — `latest` hits api.github.com/repos/oven-sh/bun/git/refs/tags
          # and fails hard when GitHub API returns 503.
          bun-version: "1.3.1"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Static export for GitHub Pages
        working-directory: apps/web
        env:
          GITHUB_PAGES: "true"
        run: bun run build

      - name: Zip static site for pre-release
        run: |
          cd apps/web/out
          zip -r "$GITHUB_WORKSPACE/vvs-web-pre-release.zip" .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

      - name: Upload pre-release zip
        uses: actions/upload-artifact@v4
        with:
          name: pre-release-zip
          path: vvs-web-pre-release.zip
          if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  pre_release:
    name: Update Current pre-release
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download pre-release zip
        uses: actions/download-artifact@v4
        with:
          name: pre-release-zip

      - name: Point pre-release tag at this commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            if git tag -f pre-release "${{ github.sha }}" && git push -f origin refs/tags/pre-release; then
              exit 0
            fi
            echo "Tag push failed (attempt $attempt); retrying in 20s…"
            sleep 20
          done
          echo "Failed to update pre-release tag after retries"
          exit 1

      - name: Publish / update Current pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          NOTES_FILE="$RUNNER_TEMP/pre-release-notes.md"
          cat > "$NOTES_FILE" <<EOF
          ## Showcase (live)

          **https://sheriff99yt.github.io/VVS-Web/**

          Same URL as the latest successful GitHub Pages deployment — open it to try the editor immediately (no install).

          Deploy URL from this run: ${PAGE_URL}

          - Commit: \`${SHA}\`
          - Offline copy: \`vvs-web-pre-release.zip\` (same static build)

          SemVer tags (\`v0.1.0\`, …) are frozen stable downloads via the Release workflow.
          EOF
          # Drop the 2-space indent from the YAML block above
          sed -i 's/^  //' "$NOTES_FILE"

          for attempt in 1 2 3 4 5 6; do
            if gh release view pre-release >/dev/null 2>&1; then
              if gh release edit pre-release \
                --title "Try it — https://sheriff99yt.github.io/VVS-Web/" \
                --prerelease \
                --target "$SHA" \
                --notes-file "$NOTES_FILE" \
                && gh release upload pre-release vvs-web-pre-release.zip --clobber; then
                echo "Updated pre-release"
                exit 0
              fi
            else
              if gh release create pre-release \
                vvs-web-pre-release.zip \
                --prerelease \
                --target "$SHA" \
                --title "Try it — https://sheriff99yt.github.io/VVS-Web/" \
                --notes-file "$NOTES_FILE"; then
                echo "Created pre-release"
                exit 0
              fi
            fi
            echo "GitHub Releases API flaky (attempt $attempt); retrying in 25s…"
            sleep 25
          done
          echo "Failed to publish pre-release after retries"
          exit 1
