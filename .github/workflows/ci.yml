name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packages:
    name: Monorepo package tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Syntax packs tests
        working-directory: packages/syntax-packs
        run: bun test

      - name: Transpiler tests
        working-directory: packages/transpiler
        run: bun test

      - name: Graph types tests
        working-directory: packages/graph-types
        run: bun test

      - name: Language profiles tests
        working-directory: packages/language-profiles
        run: bun test

      - name: Syntax registry tests
        working-directory: packages/syntax-registry
        run: bun test

      - name: Tree-sitter parse validation (strict)
        working-directory: packages/syntax-packs
        run: bun run validate:parse -- --strict

  web:
    name: Web build & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun test src/lib

  server:
    name: Go build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
