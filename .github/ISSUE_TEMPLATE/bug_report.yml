name: Bug report
description: Report a bug in the VVS Web editor or docs
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Check [docs/current_state.md](../docs/current_state.md) — mock codegen, MCP, and cloud sync are not implemented yet.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open http://localhost:3000
        2. Click Game Session example
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: main @ abc1234, or local dev date

  - type: dropdown
    id: browser
    attributes:
      label: Browser / OS
      options:
        - Chrome (Windows)
        - Firefox (Windows)
        - Edge (Windows)
        - Safari (macOS)
        - Other

  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      render: shell
