services:
  postgres:
    image: postgres:16-alpine
    container_name: vvs-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vvs
      POSTGRES_PASSWORD: vvs_dev_password
      POSTGRES_DB: vvs
    volumes:
      - vvs_pg_data:/var/lib/postgresql/data
      - ./docker/auth-init.sql:/docker-entrypoint-initdb.d/01-auth-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vvs -d vvs"]
      interval: 5s
      timeout: 5s
      retries: 5

  gotrue:
    image: supabase/gotrue:v2.184.0
    container_name: vvs-gotrue
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:54321
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://vvs:vvs_dev_password@postgres:5432/vvs?search_path=auth
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: http://localhost:3000,http://127.0.0.1:3000
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@example.com
      GOTRUE_SMTP_HOST: ""
      GOTRUE_EXTERNAL_GITHUB_ENABLED: ${GOTRUE_EXTERNAL_GITHUB_ENABLED:-false}
      GOTRUE_EXTERNAL_GITHUB_CLIENT_ID: ${GOTRUE_GITHUB_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GITHUB_SECRET: ${GOTRUE_GITHUB_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI: http://localhost:54321/auth/v1/callback

  auth-gateway:
    image: nginx:1.27-alpine
    container_name: vvs-auth-gateway
    restart: unless-stopped
    depends_on:
      - gotrue
    ports:
      - "54321:54321"
    volumes:
      - ./docker/nginx-auth.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  vvs_pg_data:
